services:
  postgres:
    image: postgres:16-alpine
    container_name: backend-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fashion_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  database:
    build:
      context: .
      dockerfile: services/database/Dockerfile
    container_name: backend-database
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fashion_store
      DATABASE_MICROSERVICE_HOST: 0.0.0.0
      DATABASE_MICROSERVICE_PORT: 5001
      PORT: 5000
      IMAGE_BASE_URL: http://localhost:5000
    ports:
      - "5000:5000"
      - "5001:5001"
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: backend-product-service
    depends_on:
      - database
    environment:
      PORT: 5002
      DATABASE_MICROSERVICE_HOST: database
      DATABASE_MICROSERVICE_PORT: 5001
    ports:
      - "5002:5002"
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: backend-auth-service
    depends_on:
      - database
    environment:
      PORT: 5003
      DATABASE_MICROSERVICE_HOST: database
      DATABASE_MICROSERVICE_PORT: 5001
    ports:
      - "5003:5003"
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: backend-order-service
    depends_on:
      - database
    environment:
      PORT: 5005
      ORDER_MICROSERVICE_HOST: 0.0.0.0
      ORDER_MICROSERVICE_PORT: 5006
      DATABASE_MICROSERVICE_HOST: database
      DATABASE_MICROSERVICE_PORT: 5001
    ports:
      - "5005:5005"
      - "5006:5006"
    restart: unless-stopped

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: backend-admin-service
    depends_on:
      - database
      - order-service
    environment:
      PORT: 5004
      DATABASE_SERVICE_HOST: database
      DATABASE_SERVICE_PORT: 5001
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT: 5006
    ports:
      - "5004:5004"
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: backend-analytics-service
    depends_on:
      - database
    environment:
      PORT: 5007
      DATABASE_MICROSERVICE_HOST: database
      DATABASE_MICROSERVICE_PORT: 5001
      GA4_MEASUREMENT_ID: ${GA4_MEASUREMENT_ID:-}
      GA4_API_SECRET: ${GA4_API_SECRET:-}
    ports:
      - "5007:5007"
    restart: unless-stopped

volumes:
  postgres_data:
