services:
  database:
    build:
      context: .
      dockerfile: services/database/Dockerfile
    container_name: backend-database
    environment:
      DATABASE_MICROSERVICE_HOST: 0.0.0.0
      DATABASE_MICROSERVICE_PORT: 5001
      DATABASE_URL: file:./prisma/dev.db
      IMAGE_BASE_URL: http://localhost:5002
    ports:
      - "5001:5001"
      - "5002:5002"
    volumes:
      - database_data:/app/services/database/prisma
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: backend-product-service
    depends_on:
      - database
    environment:
      PORT: 5000
      DATABASE_MICROSERVICE_HOST: database
      DATABASE_MICROSERVICE_PORT: 5001
    ports:
      - "5000:5000"
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: backend-auth-service
    depends_on:
      - database
    environment:
      PORT: 4004
      DATABASE_MICROSERVICE_HOST: database
      DATABASE_MICROSERVICE_PORT: 5001
    ports:
      - "4004:4004"
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: backend-order-service
    depends_on:
      - database
    environment:
      PORT: 4006
      ORDER_MICROSERVICE_HOST: 0.0.0.0
      ORDER_MICROSERVICE_PORT: 5006
      DATABASE_MICROSERVICE_HOST: database
      DATABASE_MICROSERVICE_PORT: 5001
    ports:
      - "4006:4006"
      - "5006:5006"
    restart: unless-stopped

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: backend-admin-service
    depends_on:
      - database
      - order-service
    environment:
      PORT: 4005
      DATABASE_SERVICE_HOST: database
      DATABASE_SERVICE_PORT: 5001
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT: 5006
    ports:
      - "4005:4005"
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: backend-analytics-service
    depends_on:
      - database
    environment:
      PORT: 5007
      DATABASE_MICROSERVICE_HOST: database
      DATABASE_MICROSERVICE_PORT: 5001
      GA4_MEASUREMENT_ID: ${GA4_MEASUREMENT_ID:-}
      GA4_API_SECRET: ${GA4_API_SECRET:-}
    ports:
      - "5007:5007"
    restart: unless-stopped

volumes:
  database_data:
