services:
  shop:
    build:
      context: .
      dockerfile: services/shop/Dockerfile
    container_name: frontend-shop
    command: npm run start --workspace=services/shop -- --host 0.0.0.0 --port 3001
    environment:
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://localhost:5000}
    ports:
      - "3001:3001"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    container_name: frontend-admin
    command: npm run start --workspace=services/admin -- --host 0.0.0.0 --port 3002
    ports:
      - "3002:3002"
    restart: unless-stopped

  product:
    build:
      context: .
      dockerfile: services/product/Dockerfile
    container_name: frontend-product
    command: npm run start --workspace=services/product -- --host 0.0.0.0 --port 3003
    environment:
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://localhost:5000}
    ports:
      - "3003:3003"
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: frontend-auth
    command: npm run start --workspace=services/auth -- --host 0.0.0.0 --port 3004
    ports:
      - "3004:3004"
    restart: unless-stopped

  user-profile:
    build:
      context: .
      dockerfile: services/user-profile/Dockerfile
    container_name: frontend-user-profile
    command: npm run start --workspace=services/user-profile -- --host 0.0.0.0 --port 3005
    ports:
      - "3005:3005"
    restart: unless-stopped

  host:
    build:
      context: .
      dockerfile: services/host/Dockerfile
    container_name: frontend-host
    command: npm run start --workspace=services/host -- --host 0.0.0.0 --port 3000
    depends_on:
      - shop
      - admin
      - product
      - auth
      - user-profile
    environment:
      SHOP_REMOTE_URL: http://localhost:3001
      ADMIN_REMOTE_URL: http://localhost:3002
      PRODUCT_REMOTE_URL: http://localhost:3003
      AUTH_REMOTE_URL: http://localhost:3004
      USER_PROFILE_REMOTE_URL: http://localhost:3005
    env_file:
      - services/host/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
